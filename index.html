<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI poem generator</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
</head>
<body>
    <div class ="container">
    <heading>AI Poem Generator</heading>
  <main>
    <form id = "poem-generator-form">
        <input type="text"
             placeholder="Enter the topic for your poem"
            autofocus
            required
            autocomplete="off"
            class = "instructions"
        />
        <input type="submit"  class = "submit-button"/>
    </form>
    <div class = "poem" id = "poem">
        
    </div>
  </main>

    code  <a href="https://github.com/Khanyi-Codes/AI-Poem-Generator" target="_blank">opensourced on Github</a> 
    and website hosted on <a href="" target="_blank">Netlify</a></footer>
    </div>
<script src="src/index.js"></script></body>
</html>
